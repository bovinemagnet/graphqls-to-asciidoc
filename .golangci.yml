version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - bodyclose

    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    lll:
      line-length: 120
    misspell:
      locale: UK
  exclusions:
    generated: lax
    rules:
      - linters:
          - funlen
          - mnd
        path: _test\.go
      - linters:
          - lll
        source: '^//go:generate '
      - path: (.+)\.go$
        text: exported (type|method|function) .* should have comment or be unexported
      - path: (.+)\.go$
        text: 'G304: Potential file inclusion via variable'
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/bovinemagnet/graphqls-to-asciidoc
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
